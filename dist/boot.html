<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LocalVision Boot</title>
  <style>
    body{margin:0;height:100vh;display:grid;place-items:center;background:#050816;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    div{max-width:720px;text-align:center;padding:24px} b{font-size:38px} p{color:#9fb0c7;line-height:1.6} code{color:#bfdbfe}
  </style>
</head>
<body>
  <div><b>LocalVision Boot</b><p id="msg">CMS에서 최신 Player URL을 확인하고 있습니다.</p></div>
<script>
const params = new URLSearchParams(location.search)
const id = params.get('id') || params.get('appId') || localStorage.getItem('lv-boot-last-id') || ''
const msg = document.getElementById('msg')
async function boot(){
  if(!id){ msg.innerHTML='업체 ID가 없습니다. 예: <code>/boot.html?id=lv001</code>'; return }
  localStorage.setItem('lv-boot-last-id', id)
  try{
    const res = await fetch(`/api/app-config?id=${encodeURIComponent(id)}&t=${Date.now()}`, {cache:'no-store'})
    const data = await res.json()
    if(!res.ok || data.ok===false) throw new Error(data.error || `HTTP ${res.status}`)
    if(data.active===false){ msg.textContent = `${id}는 CMS에서 비활성 상태입니다.`; return }
    if(!data.playerUrl) throw new Error('playerUrl이 없습니다.')
    localStorage.setItem(`lv-boot-last-url-${id}`, data.playerUrl)
    msg.textContent = `${id} Player로 이동합니다.`
    location.replace(data.playerUrl)
  }catch(e){
    const last = localStorage.getItem(`lv-boot-last-url-${id}`)
    if(last){ msg.textContent = `CMS 연결 실패. 마지막 정상 URL로 이동합니다. ${e.message}`; setTimeout(()=>location.replace(last), 800); return }
    msg.textContent = `부팅 실패: ${e.message}`
  }
}
boot()
</script>
</body>
</html>
